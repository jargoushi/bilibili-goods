<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>多品横测对比模板</title>
    <style>
        :root {
            --neon-pink: #FF69B4;
            --neon-pink-glow: rgba(255, 105, 180, 0.8);
            --bg-color-outer: #0A0A0E;
            --bg-color-inner: #15151A;
            --text-main: #FFFFFF;
            --text-dark: #000000;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        #app {
            width: 1920px;
            height: 1080px;
            flex-shrink: 0;
            background: radial-gradient(circle at 50% 40%, var(--bg-color-inner) 0%, var(--bg-color-outer) 100%);
            color: var(--text-main);
            padding: 50px 50px;
            /* 适当减小内边距，给卡片留出更多宽度 */
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transform-origin: center center;
        }

        /* ----- 顶栏区 Header (高度复用单品卡片样式) ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 140px;
            margin-bottom: 30px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 24px;
            width: 450px;
        }

        .avatar-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink-glow), inset 0 0 10px var(--neon-pink-glow);
            padding: 4px;
            background: #fff;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-name {
            font-size: 40px;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 15px var(--neon-pink), 0 0 25px var(--neon-pink);
        }

        .main-title-wrap {
            background: #FFB3D9;
            border: 6px solid #fff;
            border-radius: 80px;
            padding: 12px 60px;
            box-shadow: 0 0 30px var(--neon-pink-glow), inset 0 0 15px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-title {
            font-size: 50px;
            font-weight: 900;
            color: var(--text-dark);
            -webkit-text-stroke: 3px #fff;
            paint-order: stroke fill;
        }

        .index-box {
            width: 200px;
            height: 100px;
            background: #FFB3D9;
            border: 6px solid #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px var(--neon-pink-glow);
            font-size: 58px;
            font-weight: 900;
            color: var(--text-dark);
            -webkit-text-stroke: 2px #fff;
            paint-order: stroke fill;
        }

        /* ----- 内容区横版多宫格 ----- */
        .grid-container {
            display: flex;
            gap: 20px;
            flex: 1;
            height: calc(100% - 170px);
        }

        .comp-outer {
            flex: 1;
            border: 4px solid #fff;
            border-radius: 24px;
            box-shadow: 0 0 15px var(--neon-pink-glow), inset 0 0 15px var(--neon-pink-dark);
            background: #FFFFFF;
            /* 009.jpg 对比图内部是纯白的实心底色 */
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .comp-inner {
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex: 1;
            color: #000;
        }

        .comp-img-wrap {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .comp-img-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .comp-title {
            text-align: center;
            font-size: 44px;
            font-weight: 900;
            color: #000;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ccc;
            /* 灰色暗线分隔 */
        }

        .comp-specs {
            flex: 1;
            font-size: 24px;
            line-height: 1.8;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comp-highlight {
            font-size: 24px;
            line-height: 1.7;
            color: #D32F2F;
            font-weight: 900;
            margin-top: 20px;
            border-top: 2px dashed #aaa;
            padding-top: 20px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="header">
            <div class="author-info">
                <div class="avatar-wrap"><img id="avatar-img" class="avatar" src="placeholder.jpg" alt="avatar"></div>
                <div id="author-name" class="author-name">星源爱</div>
            </div>
            <div class="main-title-wrap">
                <div id="main-title" class="main-title">2025年双12 - 升降桌推荐 - 1000元以内</div>
            </div>
            <div id="index-box" class="index-box">part 1</div>
        </div>

        <div id="grid-container" class="grid-container">
            <!-- 动态生成卡片 -->
        </div>
    </div>

    <!-- 数据驱动逻辑 -->
    <script>
        function fitScreen() {
            const app = document.getElementById('app');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            app.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', fitScreen);

        window.templateData = {
            header: {
                avatar: "./对标视频_scenes/008.jpg",
                authorName: "星源爱",
                mainTitle: "2025年双12 - 升降桌推荐 - 1000以内",
                index: "part 1"
            },
            cards: [
                {
                    title: "乐歌 E2",
                    image: "./对标视频_scenes/011.jpg",
                    specs: ["单电机 1.0m*0.6m 参考价: 891", "单电机 1.2m*0.6m 参考价: 934", "升降范围72-116cm, 承重合格"],
                    highlight: "单电机结构，桌面尺寸1.0-1.6米可选，升降范围72-116cm，4档高度记忆，承重合格。"
                },
                {
                    title: "西昊 D03B",
                    image: "./对标视频_scenes/011.jpg",
                    specs: ["单电机 1.2m*0.6m 参考价: 738", "单电机 1.4m*0.6m 参考价: 781", "升降范围74-119cm, 静态承重70KG"],
                    highlight: "单电机，升降范围74-119cm，静态承重70KG，3档高度记忆，具备节能模式。"
                },
                {
                    title: "京东京造单电机",
                    image: "./对标视频_scenes/011.jpg",
                    specs: ["单电机 1.2m*0.6m 参考价: 949", "单电机 1.4m*0.7m 参考价: 1036"],
                    highlight: "包安装，集成插排（2个三孔、A口+C口），25mm厚桌板，动态承重80KG。"
                },
                {
                    title: "北弧 S1",
                    image: "./对标视频_scenes/011.jpg",
                    specs: ["单电机 1.2m*0.75m 参考价: 560"],
                    highlight: "单电机+同步带设计，高密度纤维板桌面（耐造防水），主打稳定性。"
                }
            ]
        };

        function renderTemplate(data) {
            if (!data) return;
            if (data.header) {
                document.getElementById('avatar-img').src = data.header.avatar;
                document.getElementById('author-name').innerText = data.header.authorName;
                document.getElementById('main-title').innerText = data.header.mainTitle;
                document.getElementById('index-box').innerText = data.header.index;
            }
            if (data.cards && Array.isArray(data.cards)) {
                const container = document.getElementById('grid-container');
                container.innerHTML = '';
                data.cards.forEach(card => {
                    // map and join directly to string with single quotes inside HTML fragment
                    let specsHtml = card.specs.map(s => '<div>' + s + '</div>').join('');
                    const cardHtml = '<div class="comp-outer">' +
                        '<div class="comp-inner">' +
                        '<div class="comp-img-wrap"><img src="' + card.image + '" /></div>' +
                        '<div class="comp-title">' + card.title + '</div>' +
                        '<div class="comp-specs">' + specsHtml + '</div>' +
                        '<div class="comp-highlight">' + card.highlight + '</div>' +
                        '</div>' +
                        '</div>';
                    container.innerHTML += cardHtml;
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fitScreen();
            renderTemplate(window.templateData);
        });
    </script>
</body>

</html>
