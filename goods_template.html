<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>商品测评展示卡片模板</title>
    <!-- 引入思源黑体或使用默认系统无衬线字体 -->
    <style>
        :root {
            --neon-pink: #FF69B4;
            --neon-pink-glow: rgba(255, 105, 180, 0.8);
            --neon-pink-dark: rgba(255, 105, 180, 0.3);
            --bg-color-outer: #0A0A0E;
            --bg-color-inner: #15151A;
            --text-main: #FFFFFF;
            --text-dark: #000000;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            /* 外部纯黑填充，用于适配各种分辨率屏幕 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        }

        #app {
            width: 1920px;
            height: 1080px;
            flex-shrink: 0;
            /* 将高级背景移入 #app，确保截取的 1920x1080 区域拥有正确背景 */
            background: radial-gradient(circle at 50% 40%, var(--bg-color-inner) 0%, var(--bg-color-outer) 100%);
            color: var(--text-main);
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transform-origin: center center;
        }

        /* ----- 顶栏区 Header ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 140px;
            margin-bottom: 30px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 24px;
            width: 450px;
        }

        .avatar-wrap {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink-glow), inset 0 0 10px var(--neon-pink-glow);
            padding: 4px;
            /* 留出内间距形成双环效果 */
            background: #fff;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-name {
            font-size: 40px;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 15px var(--neon-pink), 0 0 25px var(--neon-pink);
            letter-spacing: 2px;
        }

        /* 居中巨大胶囊主标题 */
        .main-title-wrap {
            background: #FFB3D9;
            /* 浅粉底色 */
            border: 6px solid #fff;
            border-radius: 80px;
            padding: 12px 60px;
            box-shadow: 0 0 30px var(--neon-pink-glow), inset 0 0 15px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-title {
            font-size: 54px;
            font-weight: 900;
            color: var(--text-dark);
            /* 黑色内核，粗白描边 */
            -webkit-text-stroke: 3px #fff;
            paint-order: stroke fill;
            letter-spacing: 2px;
        }

        /* 右侧标号框 */
        .index-box {
            width: 150px;
            height: 100px;
            background: #FFB3D9;
            border: 6px solid #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px var(--neon-pink-glow);
            font-size: 64px;
            font-weight: 900;
            color: var(--text-dark);
            -webkit-text-stroke: 2px #fff;
            paint-order: stroke fill;
        }

        /* ----- 内容区 Body ----- */
        .content-area {
            display: flex;
            gap: 40px;
            flex: 1;
            height: calc(100% - 170px);
        }

        .left-panel {
            flex: 5;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            flex: 6;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 统一的内外两层发光边框外壳 */
        .neon-outer {
            border: 4px solid #fff;
            border-radius: 24px;
            box-shadow: 0 0 20px var(--neon-pink-glow), inset 0 0 15px var(--neon-pink-dark);
            background: rgba(20, 20, 26, 0.7);
            /* 半透深黑底板 */
            padding: 10px;
            /* 控制内外边框的间距 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .left-panel .neon-outer {
            height: 100%;
        }

        .right-panel-box1 {
            flex: 4.5;
        }

        .right-panel-box2 {
            flex: 5.5;
        }

        /* 内层细边框 */
        .neon-inner {
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 14px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* 盒内通用标题 */
        .box-title {
            text-align: center;
            font-size: 42px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 12px var(--neon-pink-dark);
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        /* -- 左侧特有 -- */
        .product-image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .left-specs {
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            line-height: 1.8;
            letter-spacing: 2px;
        }

        .spec-row {
            margin-bottom: 10px;
        }

        .spec-label {
            color: var(--neon-pink);
            margin-right: 15px;
            text-shadow: 0 0 8px var(--neon-pink-dark);
        }

        .spec-value {
            color: var(--text-main);
        }

        /* -- 右侧上部：配置选项列表 -- */
        .config-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }

        .config-item {
            font-size: 34px;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        /* 自定义列表点 */
        .config-item::before {
            content: "•";
            color: var(--neon-pink);
            font-size: 50px;
            line-height: 34px;
            margin-right: 20px;
            text-shadow: 0 0 10px var(--neon-pink-glow);
        }

        /* -- 右侧下部：富文本介绍 -- */
        .rich-text-content {
            font-size: 30px;
            line-height: 1.8;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            flex: 1;
        }

        .rich-text-paragraph {
            margin: 0;
        }

        .highlight-label {
            color: var(--neon-pink);
            font-weight: 900;
            text-shadow: 0 0 8px var(--neon-pink-dark);
        }

        .highlight-bg {
            background-color: var(--neon-pink);
            color: #000;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- 顶栏 -->
        <div class="header">
            <div class="author-info">
                <div class="avatar-wrap">
                    <img id="avatar-img" class="avatar" src="placeholder.jpg" alt="avatar">
                </div>
                <div id="author-name" class="author-name">星源爱</div>
            </div>

            <div class="main-title-wrap">
                <div id="main-title" class="main-title">2025年双12 - 升降桌推荐 - 1000以内</div>
            </div>

            <div id="index-box" class="index-box">01</div>
        </div>

        <!-- 主内容区 -->
        <div class="content-area">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <div class="neon-outer">
                    <div class="neon-inner">
                        <div id="left-title" class="box-title">乐歌 E2</div>
                        <div class="product-image-container">
                            <img id="product-img" src="placeholder.jpg" alt="product">
                        </div>
                        <div id="left-specs-container" class="left-specs">
                            <!-- 动态插入属性 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="right-panel">
                <!-- 右侧上部：可选配置 -->
                <div class="neon-outer right-panel-box1">
                    <div class="neon-inner">
                        <div id="right-box1-title" class="box-title">可选配置</div>
                        <ul id="config-list-container" class="config-list">
                            <!-- 动态插入列表项 -->
                        </ul>
                    </div>
                </div>

                <!-- 右侧下部：核心参数与推荐理由 -->
                <div class="neon-outer right-panel-box2">
                    <div class="neon-inner">
                        <div id="rich-text-container" class="rich-text-content">
                            <!-- 动态插入富文本 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据渲染逻辑 -->
    <script>
        // 这是默认的测试数据，您可以随时通过外部脚本修改 window.templateData 并调用 renderTemplate(window.templateData)
        window.templateData = {
            header: {
                avatar: "./对标视频_scenes/010.jpg", /* 头像：暂时使用截图中带头像的帧作为占位 */
                authorName: "星源爱",
                mainTitle: "2025年双12 - 升降桌推荐 - 1000元以内",
                index: "01"
            },
            leftPanel: {
                title: "乐歌 E2",
                image: "./对标视频_scenes/011.jpg", /* 商品图片 */
                specs: [
                    { label: "升降范围", value: "72-116cm" },
                    { label: "噪音水平", value: "49dB" }
                ]
            },
            rightPanelTop: {
                title: "可选配置",
                items: [
                    "单电机 1.0m*0.6m 参考价：891",
                    "单电机 1.2m*0.6m 参考价：934",
                    "单电机 1.4m*0.7m 参考价：1019",
                    "单电机 1.6m*0.8m 参考价：1104"
                ]
            },
            rightPanelBottom: {
                // 使用简单的HTML标签对特定词汇进行高亮
                // .highlight-label 对应常见的发光粉色副标题
                htmlContent: `
                    <p class="rich-text-paragraph">
                        <span class="highlight-label">关键配置：</span>单电机结构，桌面尺寸1.0-1.6米可选，升降范围72-116cm，4档高度记忆，承重合格。
                    </p>
                    <p class="rich-text-paragraph" style="margin-top: 20px;">
                        <span class="highlight-label">推荐理由：</span>预算紧张朋友的首选入门款。虽然是单电机，但满足核心升降需求绝对合格，适合初次体验升降桌且身高在1.6-1.9米之间的用户。
                    </p>
                `
            }
        };

        // 渲染核心函数
        function renderTemplate(data) {
            if (!data) return;

            // 1. 渲染 Header
            if (data.header) {
                document.getElementById('avatar-img').src = data.header.avatar;
                document.getElementById('author-name').innerText = data.header.authorName;
                document.getElementById('main-title').innerText = data.header.mainTitle;
                document.getElementById('index-box').innerText = data.header.index;
            }

            // 2. 渲染左侧内容
            if (data.leftPanel) {
                document.getElementById('left-title').innerText = data.leftPanel.title;
                document.getElementById('product-img').src = data.leftPanel.image;

                const specsContainer = document.getElementById('left-specs-container');
                specsContainer.innerHTML = '';
                if (data.leftPanel.specs && Array.isArray(data.leftPanel.specs)) {
                    data.leftPanel.specs.forEach(spec => {
                        const row = document.createElement('div');
                        row.className = 'spec-row';
                        row.innerHTML = `<span class="spec-label">${spec.label}：</span><span class="spec-value">${spec.value}</span>`;
                        specsContainer.appendChild(row);
                    });
                }
            }

            // 3. 渲染右侧上部（可选配置）
            if (data.rightPanelTop) {
                document.getElementById('right-box1-title').innerText = data.rightPanelTop.title;

                const ul = document.getElementById('config-list-container');
                ul.innerHTML = '';
                if (data.rightPanelTop.items && Array.isArray(data.rightPanelTop.items)) {
                    data.rightPanelTop.items.forEach(itemText => {
                        const li = document.createElement('li');
                        li.className = 'config-item';
                        li.innerText = itemText;
                        ul.appendChild(li);
                    });
                }
            }

            // 4. 渲染右侧下部（富文本）
            if (data.rightPanelBottom && data.rightPanelBottom.htmlContent) {
                document.getElementById('rich-text-container').innerHTML = data.rightPanelBottom.htmlContent;
            }
        }

        // 自动缩放逻辑，方便人类在任意分辨率浏览器中预览居中
        function fitScreen() {
            const app = document.getElementById('app');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            app.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', fitScreen);

        // 初始化渲染
        window.addEventListener('DOMContentLoaded', () => {
            fitScreen();
            renderTemplate(window.templateData);
        });
    </script>
</body>

</html>
